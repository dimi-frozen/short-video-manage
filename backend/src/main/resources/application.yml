server:
  port: 8080

spring:
  application:
    name: short-video-manage
  datasource:
    url: jdbc:mysql://localhost:3306/short_video_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: '0509'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shortvideo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload-dir: uploads

video:
  upload:
    base-dir: ${user.home}/short-video/upload
    allowed-ext: mp4,mov,avi
    max-bytes: 104857600
  cleanup:
    keep-days: 30

platform:
  douyin:
    token-ttl-seconds: 7200
    fixed-access-token: douyin_mock_access_token
    upload-base-dir: ${user.home}/short-video/upload/douyin
  bilibili:
    token-ttl-seconds: 7200
    fixed-access-token: bilibili_mock_access_token
    upload-base-dir: ${user.home}/short-video/upload/bilibili
  kuaishou:
    mode: mock
    token-ttl-seconds: 7200
    fixed-access-token: kuaishou_mock_access_token
    upload-base-dir: ${user.home}/short-video/upload/kuaishou
    client-id:
    client-secret:
    redirect-uri:
    scope:
    oauth:
      authorize-url:
      token-url:

# JWT 配置
jwt:
  secret: short-video-manage-secret-key-2026
  expiration: 86400 # 24小时

logging:
  level:
    com.shortvideo: debug

aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucket: shrot-vidio-manage
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    public-url-prefix:
    public-read: true

# AI 大模型配置
ai:
  provider: dashscope  # 使用阿里云通义千问
  dashscope:
    api-key:   # 通义千问 API Key
    model: qwen-turbo  # qwen-turbo / qwen-plus / qwen-max
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  prompt-template: |
    请帮我优化以下视频简介，使其更具吸引力和传播性。
    你是专业的视频内容运营，请帮我优化以下视频简介：
    1. 优化目标：理解简介含义，提升吸引力，突出视频亮点，增加用户停留和互动意愿
    2. 风格：自然不生硬，适配主流短视频平台
    3. 要求：控制在150字以内，适当使用热门话题标签，结尾加一句引导互动的话
    4. 注意：只输出优化后的简介，不要多余解释
    5. 注意：不要修改原来的#标签内容
    
    原始简介：
    {description}
    
    请只返回优化后的简介文本，不要包含其他说明。


